name: Build Deps (Mac)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'libreoffice-24-8'
      release_tag:
        description: 'Existing Release tag to upload to'
        required: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-13, macos-14]
    permissions:
      contents: write

    steps:
    - name: Check if Release tag exists
      uses: mukunku/tag-exists-action@v1.6.0
      id: check-tag
      with: 
        tag: 'v24.8.x'

    - name: Release tag not exists
      run: echo "Tag does not exist, exiting..." && exit 1
      if: steps.check-tag.outputs.exists != 'true'

    - name: Check out code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install -q autoconf automake make libtool gettext nasm flex gperf gnu-tar xz
        HOMEBREW_PREFIX=$(brew --prefix)
        echo $HOMEBREW_PREFIX
        echo "$HOMEBREW_PREFIX/opt/make/libexec/gnubin" >> $GITHUB_PATH
        echo "$HOMEBREW_PREFIX/opt/libtool/libexec/gnubin" >> $GITHUB_PATH
        echo "$HOMEBREW_PREFIX/opt/flex/bin" >> $GITHUB_PATH
  
    - name: List installed packages
      run: |
        brew list --versions autoconf automake make libtool gettext nasm flex gperf
        which autoconf
        which automake
        which make
        which libtool
        which gettext
        which nasm
        which flex
        which gperf
        autoconf --version | head -1
        automake --version | head -1
        make --version | head -1
        libtool --version | head -1
        gettext --version | head -1
        nasm --version | head -1
        flex --version | head -1
        gperf --version | head -1

    - name: Clone Libreoffice
      run: |
        git clone --depth=1 --branch ${{ github.event.inputs.branch }} https://github.com/LibreOffice/core.git

    - name: Get latest commit ID and file name
      env:
        BRANCH_NAME: ${{ github.event.inputs.branch }}
      run: |
        cd core
        commit=$(git rev-parse HEAD | cut -c1-7)
        date=$(date +'%Y%m%d')
        branch=$(echo "$BRANCH_NAME" | tr -cd '0-9')
        arch=$(echo "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')
        file_name="${date}_${branch}_${commit}_deps_mac_${arch}.tar.xz"
        echo "file_name=$file_name" >> $GITHUB_ENV

    - name: Cache tarballs
      id: cache_tarballs
      uses: actions/cache@v4
      with:
        path: core/external/tarballs
        key: tarballs-${{ runner.os }}-${{ hashFiles('core/download.lst') }}
        restore-keys: |
          tarballs-${{ runner.os }}
          tarballs-
        enableCrossOsArchive: true

    - name: Build LibreOffice
      run: |
        /bin/bash ./script/build-deps-mac.sh

    - name: Compress the output
      run: |
        gtar -I "xz -T0" -cf ${{ env.file_name }} deps/

    - name: Upload build artifacts to Existing Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.release_tag }}
        files: ${{ env.file_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
