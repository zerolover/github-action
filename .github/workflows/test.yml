name: test (Win)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'master'

jobs:
  build:
    runs-on: windows-2019
    permissions:
      contents: write

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up WSL
      uses: Vampire/setup-wsl@v3
      with:
        use-cache: 'false'
        additional-packages:
          libfont-ttf-perl patch pkg-config automake make zip gperf bison nasm flex

    - name: debug
      run: |
          pwd
          ls -al
          ls -al /mnt
          ls -al /mnt/c
          ls -al /mnt/d
      shell: wsl-bash {0}
